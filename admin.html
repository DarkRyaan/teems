<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.panel {
  width:420px;
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  font-size:13px;
}

input,textarea,button {
  width:100%;
  margin:4px 0;
  padding:8px;
  border:none;
  border-radius:6px;
}

button {
  background:#22c55e;
  color:white;
  cursor:pointer;
}

#logs {
  background:#020617;
  padding:8px;
  border-radius:10px;
  height:180px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.log {
  padding:6px;
  border-radius:6px;
  font-size:12px;
}

.log.user { background:#3b82f6; }
.log.admin { background:#22c55e; color:black; }
</style>
</head>

<body>

<div class="panel">

<div id="login">
  <input id="pass" type="password" placeholder="Admin Password">
  <button id="loginBtn">Login</button>
</div>

<div id="dash" style="display:none;">

<textarea id="msg" placeholder="Announcement"></textarea>
<button id="broadcastBtn">Broadcast</button>

<button id="clearBtn">Clear Chat</button>

<h3>Logs</h3>
<div id="logs"></div>

<h3>Passwords</h3>

<input id="newUserPass" placeholder="New User Password">
<button id="setUserPassBtn">Set User Password</button>

<input id="newAdminPass" placeholder="New Admin Password">
<button id="setAdminPassBtn">Set Admin Password</button>

</div>

</div>

<script>
const API = "https://backend.ryaana059.workers.dev";

const loginDiv = document.getElementById("login");
const dashDiv = document.getElementById("dash");

const passInput = document.getElementById("pass");
const msgInput = document.getElementById("msg");
const logsDiv = document.getElementById("logs");

loginBtn.onclick = async () => {
  const res = await fetch(API + "/adminLogin", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ password: passInput.value })
  });

  const data = await res.json();

  if (data.success) {
    loginDiv.style.display = "none";
    dashDiv.style.display = "block";
    loadLogs();
    setInterval(loadLogs, 3000);
  } else {
    alert("Wrong password");
  }
};

broadcastBtn.onclick = async () => {
  await fetch(API, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      admin:true,
      type:"broadcast",
      text:msgInput.value
    })
  });

  msgInput.value="";
};

clearBtn.onclick = async () => {
  await fetch(API, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      admin:true,
      type:"clear"
    })
  });
};

setUserPassBtn.onclick = async () => {
  await fetch(API, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      admin:true,
      type:"setPassword",
      password:newUserPass.value
    })
  });
};

setAdminPassBtn.onclick = async () => {
  await fetch(API, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      admin:true,
      type:"setAdminPassword",
      password:newAdminPass.value
    })
  });
};

async function loadLogs() {
  const res = await fetch(API + "/logs");
  const data = await res.json();

  logsDiv.innerHTML = "";

  (data.logs || []).slice().reverse().forEach(l => {
    const div = document.createElement("div");
    div.className = "log " + (l.role || "user");
    div.innerText = `${l.role.toUpperCase()}: ${l.content}`;
    logsDiv.appendChild(div);
  });
}
</script>

</body>
</html>
