<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.panel {
  width:500px;
  background:#1e293b;
  padding:20px;
  border-radius:12px;
}

input,textarea,button {
  width:100%;
  margin:5px 0;
  padding:10px;
  border:none;
  border-radius:8px;
}

button { background:#22c55e; color:white; cursor:pointer; }

#logs {
  background:#020617;
  padding:10px;
  border-radius:12px;
  height:250px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.log {
  padding:10px;
  border-radius:12px;
}

.log.user { background:#3b82f6; }
.log.admin { background:#22c55e; color:black; }
</style>
</head>

<body>

<div class="panel">

<div id="login">
  <input id="pass" type="password" placeholder="Admin Password">
  <button onclick="login()">Login</button>
</div>

<div id="dash" style="display:none;">

<textarea id="msg" placeholder="Announcement"></textarea>
<button onclick="broadcast()">Broadcast</button>

<button onclick="clearChat()">Clear Chat</button>

<h3>Logs</h3>
<div id="logs"></div>

</div>

</div>

<script>
const API="https://backend.ryaana059.workers.dev";

/* LOGIN */
async function login(){
  const res=await fetch(API+"/adminLogin",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({password:pass.value})
  });

  const data=await res.json();

  if(data.success){
    login.style.display="none";
    dash.style.display="block";
    loadLogs();
    setInterval(loadLogs,3000);
  } else {
    alert("Wrong password");
  }
}

/* BROADCAST */
async function broadcast(){
  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({type:"broadcast",text:msg.value})
  });

  msg.value="";
}

/* CLEAR */
async function clearChat(){
  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({type:"clear"})
  });
}

/* LOGS */
async function loadLogs(){
  const res=await fetch(API+"/logs");
  const data=await res.json();

  logs.innerHTML=(data.logs||[]).slice().reverse().map(l=>
    `<div class="log ${l.role}">${l.role.toUpperCase()}: ${l.content}</div>`
  ).join("");
}
</script>

</body>
</html>
