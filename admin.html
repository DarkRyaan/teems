<!DOCTYPE html>
<html>
<head>
<title>Admin</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.panel {
  width:400px;
  background:#1e293b;
  padding:20px;
  border-radius:12px;
}

input,textarea,button {
  width:100%;
  margin:5px 0;
  padding:10px;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="panel">

<div id="login">
  <input id="pass" type="password">
  <button onclick="login()">Login</button>
</div>

<div id="dash" style="display:none;">

<textarea id="msg" placeholder="Announcement"></textarea>
<button onclick="broadcast()">Broadcast</button>

<button onclick="clearChat()">Clear Chat</button>

<input id="newpass" placeholder="User Password">
<button onclick="setPass()">Set User Pass</button>

<input id="newadmin" placeholder="Admin Password">
<button onclick="setAdmin()">Set Admin Pass</button>

<h3>Logs</h3>
<button onclick="loadLogs()">Load Logs</button>
<div id="logs"></div>

</div>

</div>

<script>
const API = "https://backend.ryaana059.workers.dev/";

/* LOGIN */
async function login(){
  const res = await fetch(API+"adminLogin",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({password:pass.value})
  });

  const data = await res.json();

  if(data.success){
    login.style.display="none";
    dash.style.display="block";
  }
}

/* BROADCAST */
async function broadcast(){
  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({type:"broadcast",text:msg.value})
  });
}

/* CLEAR */
async function clearChat(){
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({type:"clear"})
  });
}

/* PASSWORDS */
async function setPass(){
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({type:"setPassword",password:newpass.value})
  });
}

async function setAdmin(){
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({type:"setAdminPassword",password:newadmin.value})
  });
}

/* LOGS */
async function loadLogs(){
  const res = await fetch(API+"logs");
  const data = await res.json();

  logs.innerHTML = data.logs.map(l =>
    `[${new Date(l.time).toLocaleTimeString()}] ${l.role}: ${l.content}`
  ).join("<br>");
}
</script>

</body>
</html>
