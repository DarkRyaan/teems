<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* CENTER LOGIN */
#loginWrap {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  background:#1e293b;
  padding:25px;
  border-radius:14px;
  width:320px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

input, textarea {
  width:100%;
  margin:6px 0;
  padding:10px;
  border:none;
  border-radius:8px;
}

button {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

button:hover {
  opacity:0.9;
}

/* DASHBOARD */
#dashboard {
  display:none;
  height:100vh;
  display:flex;
}

/* SIDEBAR */
#sidebar {
  width:220px;
  background:#020617;
  padding:15px;
}

.tab {
  padding:10px;
  margin-bottom:6px;
  background:#1e293b;
  border-radius:8px;
  cursor:pointer;
}

.tab:hover {
  background:#334155;
}

/* MAIN */
#main {
  flex:1;
  padding:20px;
}

/* LOGS */
#logsBox {
  background:#020617;
  padding:10px;
  border-radius:10px;
  height:300px;
  overflow-y:auto;
  font-size:13px;
}

/* TITLE */
h2 {
  margin-top:0;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginWrap">
  <div class="card">
    <h2>Admin Login</h2>
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="tab" onclick="showTab('announce')">📢 Announce</div>
    <div class="tab" onclick="showTab('control')">⚙️ Control</div>
    <div class="tab" onclick="showTab('logs')">📊 Logs</div>
  </div>

  <!-- MAIN -->
  <div id="main">

    <!-- ANNOUNCE -->
    <div id="announceTab">
      <h2>Broadcast Message</h2>
      <textarea id="msg" placeholder="Type announcement..."></textarea>
      <button onclick="broadcast()">Send Announcement</button>
    </div>

    <!-- CONTROL -->
    <div id="controlTab" style="display:none;">
      <h2>Controls</h2>

      <button onclick="clearChat()">🧹 Clear Chat</button>

      <h3>Change User Password</h3>
      <input id="newpass" placeholder="New user password">
      <button onclick="setPass()">Update</button>

      <h3>Change Admin Password</h3>
      <input id="newadmin" placeholder="New admin password">
      <button onclick="setAdmin()">Update</button>
    </div>

    <!-- LOGS -->
    <div id="logsTab" style="display:none;">
      <h2>Live Logs</h2>
      <div id="logsBox"></div>
    </div>

  </div>
</div>
<script>
  const API = "https://backend.ryaana059.workers.dev";

/* ---------------- LOGIN ---------------- */
async function login() {
  const res = await fetch(API + "/adminLogin", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ password: pass.value })
  });

  const data = await res.json();

  if (data.success) {
    loginWrap.style.display = "none";
    dashboard.style.display = "flex";
    showTab("announce");
    startLogs();
  } else {
    alert("Wrong password");
  }
}

/* ---------------- TABS FIX ---------------- */
function showTab(tab) {
  document.getElementById("announceTab").style.display = "none";
  document.getElementById("controlTab").style.display = "none";
  document.getElementById("logsTab").style.display = "none";

  document.getElementById(tab + "Tab").style.display = "block";
}

/* ---------------- BROADCAST (POPUP STYLE) ---------------- */
async function broadcast() {
  await fetch(API, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ type:"broadcast", text: msg.value })
  });

  showPopup(msg.value);
  msg.value = "";
}

/* 🔥 POPUP (RESTORED STYLE) */
function showPopup(text) {
  const popup = document.createElement("div");

  popup.innerHTML = `
    <div style="
      position:fixed;
      top:20px;
      left:50%;
      transform:translateX(-50%);
      background:#0b1220;
      border:2px solid #22c55e;
      color:white;
      padding:16px 22px;
      border-radius:14px;
      box-shadow:0 10px 30px rgba(0,0,0,0.6);
      z-index:9999;
      text-align:center;
      min-width:250px;
    ">
      <div style="font-weight:bold; margin-bottom:5px;">SITE ADMIN</div>
      <div>${text}</div>
    </div>
  `;

  document.body.appendChild(popup);
  setTimeout(() => popup.remove(), 5000);
}

/* ---------------- CLEAR CHAT (FIXED BUTTON) ---------------- */
async function clearChat() {
  await fetch(API, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ type:"clear" })
  });

  alert("Chat cleared");
}

/* ---------------- PASSWORDS ---------------- */
async function setPass() {
  await fetch(API, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ type:"setPassword", password:newpass.value })
  });

  alert("User password updated");
}

async function setAdmin() {
  await fetch(API, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ type:"setAdminPassword", password:newadmin.value })
  });

  alert("Admin password updated");
}

/* ---------------- LOGS ---------------- */
async function loadLogs() {
  const res = await fetch(API + "/logs");
  const data = await res.json();

  logsBox.innerHTML = (data.logs || []).slice().reverse().map(l =>
    `<div>
      [${new Date(l.time).toLocaleTimeString()}]
      ${l.role}: ${l.content}
    </div>`
  ).join("");
}

function startLogs() {
  loadLogs();
  setInterval(loadLogs, 2000);
}
</script>



</body>
</html>
