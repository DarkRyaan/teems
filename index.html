<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teams and Channels | General | Microsoft Teams</title>

<link rel="icon" href="https://th.bing.com/th?q=Team%27s+Logo+White+Background&w=120&h=120&c=1&rs=1&qlt=70&o=7&dpr=2">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
/* (UNCHANGED CSS — same as yours) */
body {
  background: #0f172a;
  font-family: Arial;
  color: white;
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

#login {
  display: flex;
  flex-direction: column;
  gap: 10px;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

#login input {
  padding: 12px;
  width: 240px;
  border-radius: 10px;
  border: none;
}

#chat {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: #1e293b;
  overflow: hidden;
}

#header {
  background: #020617;
  padding: 10px;
  display: flex;
  justify-content: space-between;
  flex-shrink: 0;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  background: #020617;
}

.message {
  padding: 10px;
  border-radius: 12px;
  max-width: 75%;
  word-wrap: break-word;
  text-align: left;
}

.message p { margin: 4px 0; }
.message br { display: block; margin: 2px 0; }

.user { background: #3b82f6; align-self: flex-end; }
.ai { background: #334155; align-self: flex-start; }

#inputArea {
  display: flex;
  padding: 10px;
  gap: 5px;
  flex-shrink: 0;
}

textarea {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  resize: none;
  height: 40px;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="login">
  <h2>Enter Access</h2>
  <input type="password" id="password" placeholder="Password">
  <button onclick="setCookie()">Enter</button>
</div>

<div id="chat" style="display:none;">
  <div id="header">
    <span>AI Chat 💬</span>
    <div>
      <button onclick="openAdmin()">Admin</button>
      <button onclick="clearChat()">Clear</button>
    </div>
  </div>

  <div id="messages"></div>

  <div id="inputArea">
    <textarea id="userInput" placeholder="Type..."></textarea>
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const workerUrl = "https://backend.ryaana059.workers.dev/";
let chatHistory = JSON.parse(localStorage.getItem("chatHistory") || "[]");

// LIMIT to prevent lag
const MAX_MESSAGES = 50;

function cleanText(text) {
  return text
    .replace(/\n{3,}/g, "\n\n")
    .replace(/\n\s+\n/g, "\n\n")
    .trim();
}

/* LOGIN */
function setCookie() {
  const val = document.getElementById("password").value;

  if (val === "gofuckyourselves") {
    document.cookie = "chat_access=1";
    checkAccess();
  } else {
    window.location.href = "https://teams.cloud.microsoft";
  }
}

function checkAccess() {
  if (document.cookie.includes("chat_access=1")) {
    document.getElementById("login").style.display = "none";
    document.getElementById("chat").style.display = "flex";
    loadHistory();
  }
}

/* HISTORY */
function loadHistory() {
  const saved = localStorage.getItem("chatHistory");
  if (!saved) return;

  chatHistory = JSON.parse(saved);

  // load only recent messages (performance fix)
  for (let i = Math.max(0, chatHistory.length - MAX_MESSAGES); i < chatHistory.length; i++) {
    const m = chatHistory[i];
    addMessage(m.role === "user" ? "user" : "ai", m.content);
  }
}

function addMessage(type, text) {
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerHTML = marked.parse(cleanText(text));

  const messages = document.getElementById("messages");
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;

  // prevent DOM overload
  if (messages.children.length > 60) {
    messages.removeChild(messages.firstChild);
  }
}

function clearChat() {
  localStorage.removeItem("chatHistory");
  chatHistory = [];
  document.getElementById("messages").innerHTML = "";
}

/* OPEN ADMIN PANEL */
function openAdmin() {
  window.open("admin.html", "_blank");
}

/* CHAT */
async function sendMessage() {
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if (!text) return;

  input.value = "";

  if (text.toLowerCase() === "te") {
    window.location.href = "https://teams.cloud.microsoft";
    return;
  }

  if (text.toLowerCase() === "admin") {
    openAdmin();
    return;
  }

  addMessage("user", text);

  chatHistory.push({ role: "user", content: text });

  if (chatHistory.length > MAX_MESSAGES) {
    chatHistory.shift();
  }

  localStorage.setItem("chatHistory", JSON.stringify(chatHistory));

  const typing = document.createElement("div");
  typing.className = "message ai";
  typing.innerText = "AI is typing...";
  document.getElementById("messages").appendChild(typing);

  try {
    const res = await fetch(workerUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },

      // 🔥 ONLY SEND LAST MESSAGE (BIG FIX)
      body: JSON.stringify({
        messages: [{ role: "user", content: text }]
      })
    });

    const data = await res.json();
    typing.remove();

    const reply =
      data?.choices?.[0]?.message?.content ||
      data?.error ||
      "No response";

    addMessage("ai", reply);

    chatHistory.push({ role: "assistant", content: reply });

    if (chatHistory.length > MAX_MESSAGES) {
      chatHistory.shift();
    }

    localStorage.setItem("chatHistory", JSON.stringify(chatHistory));

  } catch (err) {
    typing.remove();
    addMessage("ai", "⚠️ Connection error");
  }
}

/* EVENTS */
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("userInput").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
});

window.onload = checkAccess;
</script>

</body>
</html>
