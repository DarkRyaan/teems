<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teams and Channels | General</title>

<link rel="icon" href="https://th.bing.com/th?q=Team%27s+Logo+White+Background&w=120&h=120&c=1">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body {
  background: #0f172a;
  font-family: Arial;
  color: white;
  text-align: center;
}

#login {
  margin-top: 120px;
}

#login input {
  padding: 12px;
  width: 240px;
  border-radius: 10px;
  border: none;
}

#chat {
  width: 420px;
  margin: 20px auto;
  background: #1e293b;
  border-radius: 15px;
  overflow: hidden;
}

#header {
  background: #020617;
  padding: 10px;
  display: flex;
  justify-content: space-between;
}

#messages {
  height: 350px;
  overflow-y: auto;
  padding: 10px;
  background: #020617;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.message {
  padding: 10px;
  border-radius: 12px;
  max-width: 75%;
  text-align: left;
  word-wrap: break-word;
}

.user {
  background: #3b82f6;
  align-self: flex-end;
}

.ai {
  background: #334155;
  align-self: flex-start;
}

#inputArea {
  display: flex;
  padding: 10px;
  gap: 5px;
}

textarea {
  flex: 1;
  border-radius: 8px;
  border: none;
  padding: 10px;
  resize: none;
  height: 40px;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Enter Access</h2>
  <input type="password" id="password" placeholder="Password">
  <button onclick="setCookie()">Enter</button>
</div>

<!-- CHAT -->
<div id="chat" style="display:none;">
  <div id="header">
    <span>My AI Chat 💬</span>
    <button onclick="clearChat()">Clear</button>
  </div>

  <div id="messages"></div>

  <div id="inputArea">
    <textarea id="userInput" placeholder="Type message..."></textarea>
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const workerUrl = "https://backend.ryaana059.workers.dev/";

let chatHistory = JSON.parse(localStorage.getItem("chatHistory")) || [];

function setCookie() {
  const val = document.getElementById("password").value;

  if (val === "NordVPN") {
    document.cookie = "chat_access=1";
    checkAccess();
  }
}

function checkAccess() {
  if (document.cookie.includes("chat_access=1")) {
    document.getElementById("login").style.display = "none";
    document.getElementById("chat").style.display = "block";
    loadHistory();
  }
}

function loadHistory() {
  chatHistory.forEach(m => {
    addMessage(m.role === "user" ? "user" : "ai", m.content);
  });
}

function addMessage(type, text) {
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerHTML = marked.parse(text);
  document.getElementById("messages").appendChild(div);
  document.getElementById("messages").scrollTop =
    document.getElementById("messages").scrollHeight;
}

function clearChat() {
  localStorage.removeItem("chatHistory");
  chatHistory = [];
  document.getElementById("messages").innerHTML = "";
}

async function sendMessage() {
  const input = document.getElementById("userInput");
  const text = input.value.trim();

  // 🔁 COMMAND: redirect to Teams
  if (text.toLowerCase() === "te") {
    window.location.href = "https://teams.cloud.microsoft";
    return;
  }

  if (!text) return;

  input.value = "";

  addMessage("user", text);
  chatHistory.push({ role: "user", content: text });

  const typing = document.createElement("div");
  typing.className = "message ai";
  typing.innerText = "AI is typing...";
  document.getElementById("messages").appendChild(typing);

  try {
    const res = await fetch(workerUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        messages: chatHistory
      })
    });

    const data = await res.json();

    typing.remove();

    const reply =
      data.choices?.[0]?.message?.content ||
      data.error ||
      "No response";

    addMessage("ai", reply);

    chatHistory.push({ role: "assistant", content: reply });
    localStorage.setItem("chatHistory", JSON.stringify(chatHistory));

  } catch (err) {
    typing.remove();
    addMessage("ai", "⚠️ Error connecting to AI");
  }
}

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("userInput").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
});

window.onload = checkAccess;
</script>

</body>
</html>
