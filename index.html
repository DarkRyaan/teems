<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My AI Chat</title>

  <!-- Markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    body {
      background: #0f172a;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }

    #login {
      margin-top: 100px;
    }

    #login input {
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    #chat {
      width: 420px;
      margin: 20px auto;
      background: #1e293b;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 0 25px rgba(0,0,0,0.4);
    }

    #header {
      background: #020617;
      padding: 15px;
      font-weight: bold;
    }

    #messages {
      height: 350px;
      overflow-y: auto;
      padding: 10px;
      background: #020617;
    }

    .message {
      padding: 10px;
      margin: 8px 0;
      border-radius: 12px;
      max-width: 75%;
      text-align: left;
      animation: fadeIn 0.2s ease-in;
      word-wrap: break-word;
    }

    .user {
      background: #3b82f6;
      margin-left: auto;
    }

    .ai {
      background: #334155;
    }

    .typing {
      opacity: 0.7;
      font-style: italic;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      gap: 5px;
    }

    #inputArea textarea {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      resize: none;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message table {
      width: 100%;
      border-collapse: collapse;
    }

    .message td, .message th {
      border: 1px solid #555;
      padding: 5px;
    }

    .message strong {
      color: #22c55e;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Enter Access</h2>
  <p id="loginMsg"></p>
  <input type="password" id="password" placeholder="Password" />
  <button onclick="setCookieAndCheck()">Enter</button>
</div>

<!-- CHAT -->
<div id="chat" style="display:none;">
  <div id="header">My AI Chat</div>
  <div id="messages"></div>
  <div id="inputArea">
    <textarea id="userInput" placeholder="Type a message..."></textarea>
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
let chatHistory = [];

// ✅ Check cookie
function checkAccess() {
  const cookieValue = document.cookie
    .split("; ")
    .find(row => row.startsWith("chat_access="))
    ?.split("=")[1];

  if (cookieValue === "NordVPN") {
    document.getElementById("login").style.display = "none";
    document.getElementById("chat").style.display = "block";
  } else {
    document.getElementById("login").style.display = "block";
    document.getElementById("chat").style.display = "none";
  }
}

// ✅ Set cookie
function setCookieAndCheck() {
  const input = document.getElementById("password").value;

  if (input === "NordVPN") {
    document.cookie = "chat_access=NordVPN; path=/";
    checkAccess();
  } else {
    window.location.href = "https://teams.cloud.microsoft";
  }
}

// ✨ Format text
function formatText(text) {
  text = text.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>");
  return marked.parse(text);
}

// 💬 Add message
function addMessage(text, sender) {
  const msg = document.createElement("div");
  msg.className = "message " + sender;
  msg.innerHTML = formatText(text);
  document.getElementById("messages").appendChild(msg);

  const messagesDiv = document.getElementById("messages");
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

// 🚀 Send message
async function sendMessage() {
  const inputBox = document.getElementById("userInput");
  const message = inputBox.value.trim();
  if (!message) return;

  addMessage(message, "user");
  chatHistory.push("User: " + message);
  inputBox.value = "";

  const messagesDiv = document.getElementById("messages");

  const typing = document.createElement("div");
  typing.className = "message ai typing";
  typing.id = "typing";
  typing.innerText = "AI is typing...";
  messagesDiv.appendChild(typing);

  try {
    const prompt = `
You are a helpful assistant.

Conversation so far:
${chatHistory.join("\n")}

AI:
`;

    const response = await fetch(
      "https://text.pollinations.ai/" + encodeURIComponent(prompt)
    );

    let reply = await response.text();
    reply = reply.trim().replace(/\n{3,}/g, "\n\n");

    document.getElementById("typing").remove();
    addMessage(reply, "ai");
    chatHistory.push("AI: " + reply);

  } catch (err) {
    document.getElementById("typing").remove();
    addMessage("⚠️ Error connecting to AI", "ai");
  }
}

// ⌨️ Enter key
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("userInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
});

// ✅ On load
window.addEventListener("load", checkAccess);
</script>

</body>
</html>
