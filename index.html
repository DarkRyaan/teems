<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teams and Channels | General | Microsoft Teams</title>

<link rel="icon" href="https://th.bing.com/th?q=Team%27s+Logo+White+Background&w=120&h=120&c=1&rs=1&qlt=70&o=7&dpr=2">

<style>
body {
  background: #0f172a;
  font-family: Arial;
  color: white;
  margin: 0;
  height: 100vh;
  overflow: hidden;
}

/* LOGIN */
#login {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  gap: 10px;
}

#login input {
  padding: 12px;
  width: 240px;
  border-radius: 10px;
  border: none;
}

/* CHAT */
#chat {
  display: none;
  width: 100vw;
  height: 100vh;
  flex-direction: column;
  background: #1e293b;
}

/* HEADER */
#header {
  background: #020617;
  padding: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* MESSAGES */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  background: #020617;
}

.message {
  padding: 10px;
  border-radius: 12px;
  max-width: 75%;
  word-wrap: break-word;
}

.user {
  background: #3b82f6;
  align-self: flex-end;
}

.ai {
  background: #334155;
  align-self: flex-start;
}

/* INPUT */
#inputArea {
  display: flex;
  padding: 10px;
  gap: 5px;
}

textarea {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  resize: none;
  height: 40px;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: white;
  cursor: pointer;
}

/* ANNOUNCEMENT */
#popup {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #0b1220;
  border: 2px solid #22c55e;
  padding: 16px 22px;
  border-radius: 12px;
  z-index: 9999;
  display: none;
  text-align: center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Enter Access</h2>
  <input type="password" id="password">
  <button onclick="login()">Enter</button>
</div>

<!-- CHAT -->
<div id="chat">
  <div id="header">
    <span>AI Chat 💬</span>
  </div>

  <div id="messages"></div>

  <div id="inputArea">
    <textarea id="userInput" placeholder="Type here"></textarea>
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<!-- POPUP -->
<div id="popup"></div>

<script>
const API = "https://backend.ryaana059.workers.dev";

/* SAFE STATE */
let messages, userInput;
let lastClear = localStorage.getItem("lastClear") || "0";
let lastBroadcastId = localStorage.getItem("lastBroadcastId") || null;

/* INIT */
window.addEventListener("DOMContentLoaded", () => {
  messages = document.getElementById("messages");
  userInput = document.getElementById("userInput");

  if (!messages || !userInput) return;

  setupEnter();
  startSync();

  if (document.cookie.includes("chat_access=1")) {
    document.getElementById("login").style.display = "none";
    document.getElementById("chat").style.display = "flex";
  }
});

/* LOGIN */
async function login() {
  try {
    const pass = document.getElementById("password").value;

    const res = await fetch(API + "/login", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ password: pass })
    });

    const data = await res.json();

    if (data.success) {
      document.cookie = "chat_access=1";
      location.reload();
    } else {
      alert("Wrong password");
    }

  } catch {
    alert("Server error");
  }
}

/* SEND MESSAGE */
async function sendMessage() {
  const text = userInput.value.trim();
  if (!text) return;

  userInput.value = "";

  add("user", text);

  try {
    const res = await fetch(API, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        messages: [{ role: "user", content: text }]
      })
    });

    const data = await res.json();

    add("ai", data?.choices?.[0]?.message?.content || "No response");

  } catch {
    add("ai", "⚠️ Error");
  }
}

/* ADD MESSAGE */
function add(type, text) {
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

/* ENTER KEY */
function setupEnter() {
  userInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
}

/* ANNOUNCEMENT POPUP */
function showPopup(text) {
  const popup = document.getElementById("popup");
  popup.innerText = "SITE ADMIN: " + text;
  popup.style.display = "block";

  setTimeout(() => {
    popup.style.display = "none";
  }, 5000);
}

/* SYNC SYSTEM */
async function startSync() {
  setInterval(async () => {
    try {
      const res = await fetch(API + "/status");
      const data = await res.json();

      /* CLEAR */
      if (data.lastCleared && String(data.lastCleared) !== lastClear) {
        lastClear = String(data.lastCleared);
        localStorage.setItem("lastClear", lastClear);
        if (messages) messages.innerHTML = "";
      }

      /* BROADCAST (NO REPEAT ON REFRESH) */
      if (data.broadcast?.id) {
        const id = String(data.broadcast.id);

        if (id !== lastBroadcastId) {
          lastBroadcastId = id;
          localStorage.setItem("lastBroadcastId", id);

          showPopup(data.broadcast.text);
        }
      }

    } catch {}
  }, 3000);
}
</script>

</body>
</html>
