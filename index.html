<!-- SAME UI, upgraded logic -->
<script>
const API = "https://backend.ryaana059.workers.dev/";
let lastClear = 0;
let lastBroadcast = "";
let sessionVersion = 0;

async function setCookie() {
  const val = document.getElementById("password").value;

  const res = await fetch(API + "login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ password: val })
  });

  const data = await res.json();

  if (data.success) {
    sessionVersion = data.sessionVersion;
    document.cookie = "chat_access=1";
    checkAccess();
  } else {
    alert("Wrong password");
  }
}

async function checkStatus() {
  try {
    const res = await fetch(API + "status");
    const data = await res.json();

    if (data.lastCleared && data.lastCleared !== lastClear) {
      lastClear = data.lastCleared;
      document.getElementById("messages").innerHTML = "";
    }

    if (data.broadcast && data.broadcast !== lastBroadcast) {
      lastBroadcast = data.broadcast;
      addMessage("ai", "📢 " + data.broadcast);
    }

    if (sessionVersion && data.sessionVersion !== sessionVersion) {
      alert("Logged out by admin");
      location.reload();
    }

  } catch {}
}

setInterval(checkStatus, 3000);
</script>
