<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teams and Channels</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  height: 100vh;
}

#chat {
  display:flex;
  flex-direction:column;
  height:100vh;
}

#messages {
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.message {
  padding:10px;
  border-radius:10px;
  max-width:75%;
}

.user { background:#3b82f6; align-self:flex-end; }
.ai { background:#334155; align-self:flex-start; }

#inputArea {
  display:flex;
  padding:10px;
  gap:5px;
}

textarea {
  flex:1;
  padding:10px;
  border-radius:8px;
  border:none;
  resize:none;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
}
</style>
</head>

<body>

<div id="chat">
  <div id="messages"></div>

  <div id="inputArea">
    <textarea id="userInput"></textarea>
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const API = "https://backend.ryaana059.workers.dev";

let messages = document.getElementById("messages");
let userInput = document.getElementById("userInput");

/* =========================
   CHAT PERSISTENCE FIX
========================= */
let chatHistory = JSON.parse(localStorage.getItem("chat") || "[]");

chatHistory.forEach(m => add(m.role, m.text, false));

function add(type, text, save=true){
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;

  if (save) {
    chatHistory.push({ role: type, text });
    localStorage.setItem("chat", JSON.stringify(chatHistory));
  }
}

/* =========================
   SEND MESSAGE
========================= */
async function sendMessage() {
  const text = userInput.value.trim();
  if (!text) return;

  userInput.value = "";

  add("user", text);

  const res = await fetch(API, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      messages:[{role:"user",content:text}]
    })
  });

  const data = await res.json();

  const reply = data?.choices?.[0]?.message?.content || "No response";

  add("ai", reply);
}

/* =========================
   SESSION VERSION CHECK (FIX LOGOUT)
========================= */
setInterval(async () => {
  try {
    const res = await fetch(API + "/status");
    const data = await res.json();

    const localVersion = localStorage.getItem("sessionVersion");

    if (data.sessionVersion &&
        localVersion &&
        data.sessionVersion != localVersion) {

      localStorage.clear();
      alert("Session changed — logged out");
      location.reload();
    }

  } catch {}
}, 4000);
</script>

</body>
</html>
