<script>
const API = "https://backend.ryaana059.workers.dev";

/* 🔥 FIXED MEMORY STORAGE */
let lastClear = localStorage.getItem("lastClear") || "0";
let lastBroadcastId = localStorage.getItem("lastBroadcastId") || null;

/* ENTER TO SEND */
document.addEventListener("DOMContentLoaded", () => {
  const input = document.getElementById("userInput");

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  if (document.cookie.includes("chat_access=1")) {
    document.getElementById("login").style.display = "none";
    document.getElementById("chat").style.display = "flex";
  }

  setInterval(checkStatus, 3000);
});

/* LOGIN */
async function login() {
  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ password: password.value })
  });

  const data = await res.json();

  if (data.success) {
    document.cookie = "chat_access=1";
    location.reload();
  } else {
    alert("Wrong password");
  }
}

/* SEND */
async function sendMessage() {
  const input = document.getElementById("userInput");
  const messages = document.getElementById("messages");

  const text = input.value.trim();
  if (!text) return;

  input.value = "";

  messages.innerHTML += `<div class="message user">${text}</div>`;

  const res = await fetch(API, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      messages: [{ role: "user", content: text }]
    })
  });

  const data = await res.json();

  messages.innerHTML += `<div class="message ai">${
    data?.choices?.[0]?.message?.content || "No response"
  }</div>`;
}

/* ANNOUNCEMENT POPUP */
function showAnnouncement(text) {
  const popup = document.createElement("div");

  popup.innerHTML = `
    <div style="
      position:fixed;
      top:30px;
      left:50%;
      transform:translateX(-50%);
      background:#0b1220;
      border:2px solid #22c55e;
      color:white;
      padding:16px 22px;
      border-radius:14px;
      z-index:9999;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.6);
    ">
      <b>SITE ADMIN</b><br>${text}
    </div>
  `;

  document.body.appendChild(popup);
  setTimeout(() => popup.remove(), 5000);
}

/* STATUS SYNC (FIXED MEMORY BUG) */
async function checkStatus() {
  try {
    const res = await fetch(API + "/status");
    const data = await res.json();

    /* CLEAR FIX */
    if (data.lastCleared && String(data.lastCleared) !== lastClear) {
      lastClear = String(data.lastCleared);
      localStorage.setItem("lastClear", lastClear);
      document.getElementById("messages").innerHTML = "";
    }

    /* BROADCAST FIX (NO REFRESH LOOP BUG) */
    if (data.broadcast?.id) {
      const id = String(data.broadcast.id);

      if (id !== lastBroadcastId) {
        lastBroadcastId = id;
        localStorage.setItem("lastBroadcastId", id);

        showAnnouncement(data.broadcast.text);
      }
    }

  } catch {}
}
</script>
